<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- White background for browser tabs -->
  <rect width="100" height="100" rx="22" fill="#FFFFFF"/>
  
  <!-- Subtle border to define the shape on white/light browser tabs -->
  <rect x="0.5" y="0.5" width="99" height="99" rx="21.5" stroke="#EAEAEA" stroke-width="1"/>
  
  <!-- Black Triangle Logo with clean rounded corners -->
  <polygon 
    points="50,29 25,71 75,71" 
    fill="#0A0A0A" 
    stroke="#0A0A0A" 
    stroke-width="6" 
    stroke-linejoin="round"
  />
</svg>
